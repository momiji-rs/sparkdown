name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Test (default) — includes the CommonMark 0.31.2 conformance gate
        run: cargo test --verbose
      - name: CommonMark conformance (652/652, explicit)
        run: cargo test --test spec -- --nocapture
      - name: Test (arena feature)
        run: cargo test --features arena --verbose
      - name: Test (gfm feature) — GFM extensions + 652 conformance
        run: cargo test --features gfm --verbose

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features

  docs:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  msrv:
    name: MSRV (1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --verbose

  wasm:
    name: wasm + npm (652/652 via wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Build + inline both wasm variants (the `.` and `./gfm` entries)
        run: |
          RF="-D warnings -C target-feature=+simd128,+bulk-memory"
          W=../target/wasm32-unknown-unknown/release/sparkdown.wasm
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm
          (cd npm && node build.mjs "$W" wasm-inline.mjs)
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm,gfm
          (cd npm && node build.mjs "$W" gfm-wasm-inline.mjs)
      - name: Conformance + GFM gate through the wasm (both entries, 652/652)
        run: npm test
        working-directory: npm
