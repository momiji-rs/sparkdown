# Publishes both npm packages via OIDC **Trusted Publishing** — no NPM_TOKEN
# secret, and npm attaches a signed provenance statement:
#   @momiji-rs/sparkdown      (npm/,     pure CommonMark)
#   @momiji-rs/sparkdown-gfm  (npm-gfm/, CommonMark + GFM)
#
# One-time setup on npmjs.com, **per package**:
#   Package → Settings → Trusted Publisher → GitHub Actions
#   Repository: momiji-rs/sparkdown   Workflow: release-npm.yml
# Then publish by pushing a tag:  git tag v0.0.2 && git push origin v0.0.2
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write # OIDC: npm trusted publishing + provenance
  contents: read

jobs:
  # Attach the raw, optimized wasm modules (+ SHA-256 sums) to the GitHub Release
  # for non-JS hosts (wasmtime, wazero, Workers, …) that want the bare module.
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Build + optimize both wasm modules
        run: |
          RF="-C target-feature=+simd128,+bulk-memory"
          O="-O3 --enable-simd --enable-bulk-memory --strip-debug --strip-producers"
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm
          wasm-opt $O target/wasm32-unknown-unknown/release/sparkdown.wasm -o sparkdown.wasm
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm,gfm
          wasm-opt $O target/wasm32-unknown-unknown/release/sparkdown.wasm -o sparkdown-gfm.wasm
          sha256sum sparkdown.wasm sparkdown-gfm.wasm > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            sparkdown.wasm
            sparkdown-gfm.wasm
            SHA256SUMS.txt

  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { dir: npm, features: wasm }
          - { dir: npm-gfm, features: "wasm,gfm" }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never cache in release builds
      - name: Build the wasm (+simd128, +bulk-memory)
        run: RUSTFLAGS="-C target-feature=+simd128,+bulk-memory" cargo build --target wasm32-unknown-unknown --release --features ${{ matrix.features }}
      - run: npm run build --if-present # wasm-opt + base64 inline (build.mjs)
        working-directory: ${{ matrix.dir }}
      - run: npm test # CommonMark 652/652 (+ GFM checks) through the wasm
        working-directory: ${{ matrix.dir }}
      - run: npm publish --provenance --access public
        working-directory: ${{ matrix.dir }}
