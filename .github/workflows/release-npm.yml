# Publishes both npm packages via OIDC **Trusted Publishing** — no NPM_TOKEN
# secret, and npm attaches a signed provenance statement:
#   @momiji-rs/sparkdown      (npm/,     pure CommonMark)
#   @momiji-rs/sparkdown-gfm  (npm-gfm/, CommonMark + GFM)
#
# One-time setup on npmjs.com, **per package**:
#   Package → Settings → Trusted Publisher → GitHub Actions
#   Repository: momiji-rs/sparkdown   Workflow: release-npm.yml
# Then publish by pushing a tag:  git tag v0.0.2 && git push origin v0.0.2
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write # OIDC: npm trusted publishing + provenance
  contents: read

jobs:
  # Publish the Rust crate to crates.io via OIDC Trusted Publishing.
  # One-time setup: crates.io → the crate → Settings → Trusted Publishing →
  # GitHub (repo momiji-rs/sparkdown, workflow release-npm.yml).
  publish-crate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for crates.io trusted publishing
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Attach the raw, optimized wasm modules (+ SHA-256 sums) to the GitHub Release
  # for non-JS hosts (wasmtime, wazero, Workers, …) that want the bare module.
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Build + optimize the three wasm modules
        run: |
          RF="-C target-feature=+simd128,+bulk-memory"
          O="-O3 --enable-simd --enable-bulk-memory --strip-debug --strip-producers"
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm
          wasm-opt $O target/wasm32-unknown-unknown/release/sparkdown.wasm -o sparkdown.wasm
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm,gfm
          wasm-opt $O target/wasm32-unknown-unknown/release/sparkdown.wasm -o sparkdown-gfm.wasm
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm,full
          wasm-opt $O target/wasm32-unknown-unknown/release/sparkdown.wasm -o sparkdown-full.wasm
          sha256sum sparkdown.wasm sparkdown-gfm.wasm sparkdown-full.wasm > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            sparkdown.wasm
            sparkdown-gfm.wasm
            sparkdown-full.wasm
            SHA256SUMS.txt

  # One package, two subpath entries (`.` CommonMark + `./gfm`): build both wasm
  # variants, inline each, then publish the single package.
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never cache in release builds
      - name: Build + inline the three wasm variants (. / gfm / full)
        run: |
          RF="-C target-feature=+simd128,+bulk-memory"
          W=../target/wasm32-unknown-unknown/release/sparkdown.wasm
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm
          (cd npm && node build.mjs "$W" wasm-inline.mjs)
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm,gfm
          (cd npm && node build.mjs "$W" gfm-wasm-inline.mjs)
          RUSTFLAGS="$RF" cargo build --target wasm32-unknown-unknown --release --features wasm,full
          (cd npm && node build.mjs "$W" full-wasm-inline.mjs)
      - run: npm test # all three entries: CommonMark 652/652 + GFM/full checks
        working-directory: npm
      - run: npm publish --provenance --access public
        working-directory: npm
