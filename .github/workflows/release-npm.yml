# Publishes @momiji-rs/sparkdown to npm via OIDC **Trusted Publishing** — no
# NPM_TOKEN secret, and npm attaches a signed provenance statement.
#
# One-time setup on npmjs.com:
#   Package → Settings → Trusted Publisher → GitHub Actions
#   Repository: momiji-rs/sparkdown   Workflow: release-npm.yml
# Then publish by pushing a tag:  git tag v0.0.2 && git push origin v0.0.2
name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write # OIDC: npm trusted publishing + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never cache in release builds
      - name: Build the wasm (+simd128, +bulk-memory)
        run: RUSTFLAGS="-C target-feature=+simd128,+bulk-memory" cargo build --target wasm32-unknown-unknown --release --features wasm
      - run: npm run build --if-present # wasm-opt + base64 inline (build.mjs)
        working-directory: npm
      - run: npm test # 652/652 CommonMark conformance through the wasm
        working-directory: npm
      - run: npm publish --provenance --access public
        working-directory: npm
